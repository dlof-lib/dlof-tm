name: Build APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # GitHub Actions does not allow the `secrets` context inside `if:`
    # conditionals directly — it's only usable in `env:`/`with:`. So we
    # resolve it once here into a plain job-level env var, then branch on
    # that env var in each step's `if:` below.
    env:
      HAS_KEYSTORE: ${{ secrets.DLOFTM_KEYSTORE_BASE64 != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # No committed Gradle wrapper jar is required — this action installs
      # the Gradle version declared in gradle/wrapper/gradle-wrapper.properties
      # (or the version below) and provides build caching.
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.9

      - name: Build debug APK
        run: gradle :app:assembleDebug --no-daemon --stacktrace

      - name: Decode release keystore
        if: env.HAS_KEYSTORE == 'true'
        run: |
          echo "${{ secrets.DLOFTM_KEYSTORE_BASE64 }}" | base64 -d > "${{ github.workspace }}/release.keystore"

      - name: Build release APK
        if: env.HAS_KEYSTORE == 'true'
        env:
          DLOFTM_KEYSTORE_PATH: ${{ github.workspace }}/release.keystore
          DLOFTM_KEYSTORE_PASSWORD: ${{ secrets.DLOFTM_KEYSTORE_PASSWORD }}
          DLOFTM_KEY_ALIAS: ${{ secrets.DLOFTM_KEY_ALIAS }}
          DLOFTM_KEY_PASSWORD: ${{ secrets.DLOFTM_KEY_PASSWORD }}
        run: gradle :app:assembleRelease --no-daemon --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: dlof-TM-debug
          path: app/build/outputs/apk/debug/*.apk

      - name: Upload release APK
        if: env.HAS_KEYSTORE == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: dlof-TM-release
          path: app/build/outputs/apk/release/*.apk
